<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Javascript Variables</h1>
    <p>Addition and substraction of two numbers (86 & 43):</p>
    <p id="result1"></p>
    <p id="result2"></p>
    <script>

        var num1 = 86;
        var num2 = 43;
        var sum = num1 + num2;
        document.getElementById("result1").innerHTML = "The total of 86 + 43 is: " + sum;

        var sub = num1 - num2;
        document.getElementById("result2").innerHTML = "The total of 86 - 43 is: " + sub;

    </script>
</body>

</html>
