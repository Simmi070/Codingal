<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Javascript Method Handeling</h2>
    <p>This example demonstrates how to use <b>catch</b> to desplay an error.</p>
    <p id="error-message"></p>
    <script>
        try {
            addalert("Welcome Guest!");
        }
        catch (err) {
            document.getElementById("error-message").innerHTML = err.message;
        }
    </script>
</body>

</html>
