<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>The Javascript String() Method</h2>
    <p>The String() method can convert a number to a string.</p>
    <p><strong>Number</strong></p>
    <p id="number-result"></p>
    <p><strong>String</strong></p>
    <p id="string-result"></p>
    <script>
        var x = 70;
        var y = 90;
        document.getElementById("number-result").innerHTML = x + y;
        document.getElementById("string-result").innerHTML = String(x) + String(y);
    </script>
</body>

</html>
